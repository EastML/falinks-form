name: Publish to npm

on:
  release:
    types: [published] # Triggers when you click "Publish Release" on GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # CRITICAL: Required for npm Trusted Publishing tokenless login
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Uses stable Node LTS
          registry-url: 'https://npmjs.org'

      - name: Install Project Dependencies
        run: npm ci

      - name: Publish Package to npm
        run: npm publish --provenance
